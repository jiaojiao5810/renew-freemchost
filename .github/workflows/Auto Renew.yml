name: Server Auto Renew

on:
  schedule:
    - cron: '0 2 * * *' # 每天北京时间 10:00 自动运行
  workflow_dispatch: # 允许手动点击运行

jobs:
  renew_job:
    runs-on: ubuntu-latest

    steps:
    # 1. 下载仓库代码
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 安装 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖库
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. 运行续期脚本 (运行结果会写入本地文本，方便 TG 读取)
    - name: Run renew script
      env:
        MY_EMAIL: ${{ secrets.MY_EMAIL }}
        MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        ANON_KEY: ${{ secrets.ANON_KEY }}
      # tee 命令可以让日志同时输出到屏幕并保存到客户端文件中
      run: python renew1.py | tee renew.log

    # 5. 发送 TG 通知 (无论前一步成功还是失败都会执行)
    - name: Send Telegram Notification
      if: always()
      env:
        TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_USER_ID }}
      run: |
        # 1. 判断上一项任务的状态，组合通知标题
        if [ "${{ job.status }}" = "success" ]; then
          TITLE="✅ Freemchost 自动续期成功！"
        else
          TITLE="❌ Freemchost 自动续期失败！"
        fi

        # 2. 提取 Python 脚本输出的最后 8 行作为关键日志
        LOG_SUMMARY=$(tail -n 8 renew.log | sed 's/"//g')

        # 3. 组合最终发送的消息文本
        MSG_TEXT="${TITLE}

        工作流详情: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

        📋 运行日志摘要:
        ${LOG_SUMMARY}"

        # 4. 调用 TG API 发送 POST 请求
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -d "chat_id=${TG_ID}" \
          -d "text=${MSG_TEXT}"
